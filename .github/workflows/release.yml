name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release
        id: changesets
        uses: changesets/action@v1
        with:
          version: bunx changeset version
          publish: bun run ci:publish
          commit: 'chore: release packages'
          title: 'chore: release packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build Chrome extension
        if: steps.changesets.outputs.published == 'true'
        working-directory: packages/extension
        run: bun run zip

      - name: Attach extension zip to release
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | select(.name == "@inspatch/server") | .version')
          [ -n "$VERSION" ] && gh release upload "@inspatch/server@${VERSION}" packages/extension/.output/*.zip --clobber || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
