name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Calculate new version
        id: version
        run: |
          CURRENT=$(node -p "require('./packages/server/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ github.event.inputs.bump }}" in
            major) NEW="$((MAJOR+1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR+1)).0" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT

      - name: Bump version in package.json files
        run: |
          node -e "
            const fs = require('fs');
            const v = '${{ steps.version.outputs.version }}';
            ['packages/extension/package.json', 'packages/server/package.json', 'packages/shared/package.json'].forEach(p => {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = v;
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            });
          "

      - name: Configure npm auth
        run: npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: |
          cd packages/shared && bun publish --no-git-checks
          cd ../server && bun publish --no-git-checks

      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/extension/package.json packages/server/package.json packages/shared/package.json
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Build Chrome extension
        working-directory: packages/extension
        run: bun run zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: packages/extension/.output/*.zip
